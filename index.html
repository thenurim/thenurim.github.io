---
layout: default
title: Home
---

<div class="posts" id="posts-container">
  {% for post in site.posts %}
  {% if post.lang %}
  <div class="post" data-lang="{{ post.lang }}">
    <h1 class="post-title">
      <a href="{{ post.url | absolute_url }}">
        {{ post.title }}
      </a>
    </h1>

    <span class="post-date">{{ post.date | date_to_string }}</span>

    {{ post.excerpt }}

  </div>
  {% endif %}
  {% endfor %}
</div>
